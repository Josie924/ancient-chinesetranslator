<script>
    async function start() {
        const key = "AIzaSyAK5PsZBBgmqhHIaQdZZhupo5fKO-S2sZg"; 
        const input = document.getElementById('userInput').value;
        const res = document.getElementById('result');
        if (!input.trim()) return alert("請輸入內容");
        res.innerText = "老師正在研墨中...";
        try {
            // 注意這裡：我把型號改成了最穩定的 gemini-1.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是文學家。請將這段文字翻譯成文言文或解析： " + input }] }]
                })
            });
            const data = await response.json();
            
            if (data.error) {
                res.innerText = "【診斷】" + data.error.message;
            } else if (data.candidates && data.candidates[0].content) {
                res.innerText = data.candidates[0].content.parts[0].text;
            } else {
                res.innerText = "AI 回傳了空結果，請稍後再試。";
            }
        } catch (e) {
            res.innerText = "連線失敗，請檢查網路。";
        }
    }
</script>
